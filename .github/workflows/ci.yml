name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: recollect
          POSTGRES_PASSWORD: recollect
          POSTGRES_DB: recollect
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recollect -d recollect"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Run tests
        env:
          RECOLLECT_TEST_PG_URL: postgresql://recollect:recollect@localhost:5432/recollect
        run: yarn test
