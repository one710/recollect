name: Publish to NPM

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read

env:
  RECOLLECT_TEST_PG_URL: postgresql://recollect:recollect@localhost:5432/recollect
  RECOLLECT_TEST_SUPABASE_URL: http://127.0.0.1:35432
  RECOLLECT_TEST_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Docker stack (Postgres + PostgREST + gateway)
        run: docker compose up -d

      - name: Wait for Postgres and REST API
        run: |
          for i in $(seq 1 60); do
            if nc -z 127.0.0.1 5432 && nc -z 127.0.0.1 35432; then
              break
            fi
            sleep 1
          done
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "apikey: ${RECOLLECT_TEST_SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${RECOLLECT_TEST_SUPABASE_ANON_KEY}" \
              "${RECOLLECT_TEST_SUPABASE_URL}/rest/v1/messages?select=id&limit=1")
            if [ "$code" = "200" ]; then
              exit 0
            fi
            sleep 1
          done
          echo "REST gateway did not become ready in time"
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: "yarn"

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Run Tests
        run: yarn test

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
